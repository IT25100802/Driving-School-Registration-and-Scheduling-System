<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DriveHUB - Admin Management</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="css/style.css" rel="stylesheet">
    <script src="js/api.js"></script>
    <script src="js/components.js"></script>
</head>

<body>

    <main class="main-content">
        <div class="container-fluid p-0">
            <div class="d-flex justify-content-between align-items-end mb-4">
                <div>
                    <h2 class="h3 fw-bold mb-1">Admin Management</h2>
                    <p class="text-secondary mb-0">Configure system-wide permissions and security access.</p>
                </div>
                <button class="btn-modern btn-primary-modern" data-bs-toggle="modal" data-bs-target="#newAdminModal">
                    <i data-lucide="plus" class="me-2" size="18"></i> New Admin
                </button>
            </div>

            <div class="glass-card mb-4">
                <h4 class="h5 fw-bold mb-4">System Administrators</h4>
                <div class="table-responsive">
                    <table class="table custom-table mb-0">
                        <thead>
                            <tr>
                                <th>Admin User</th>
                                <th>Role</th>
                                <th class="text-end">Actions</th>
                            </tr>
                        </thead>
                        <tbody id="adminTableBody">
                            <!-- Data injected here -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <!-- Modal... -->
    <div class="modal fade" id="newAdminModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 glass-card p-0 shadow-2xl">
                <div class="modal-header border-black/10 p-5 pb-4">
                    <div>
                        <h4 class="modal-title fw-bold display-6 tracking-tight">New Administrator</h4>
                        <p class="text-secondary text-sm m-0 mt-1">Create a new system user with specific roles.</p>
                    </div>
                    <button type="button" class="icon-btn" data-bs-dismiss="modal"><i data-lucide="x"
                            size="24"></i></button>
                </div>
                <form id="newAdminForm">
                    <div class="modal-body p-5 pt-4">
                        <div class="row g-4 mb-5">
                            <div class="col-12">
                                <label
                                    class="form-label text-xs fw-bold text-secondary text-uppercase tracking-widest mb-3">Full
                                    Name</label>
                                <input type="text" class="search-input" id="admFullName"
                                    placeholder="e.g. Alexander Sterling" required>
                            </div>
                            <div class="col-md-6">
                                <label
                                    class="form-label text-xs fw-bold text-secondary text-uppercase tracking-widest mb-3">Username</label>
                                <input type="text" class="search-input" id="admUsername" placeholder="e.g. alex_admin"
                                    required>
                            </div>
                            <div class="col-md-6">
                                <label
                                    class="form-label text-xs fw-bold text-secondary text-uppercase tracking-widest mb-3">Password</label>
                                <input type="password" class="search-input" id="admPassword" placeholder="••••••••"
                                    required>
                            </div>
                            <div class="col-md-6">
                                <label
                                    class="form-label text-xs fw-bold text-secondary text-uppercase tracking-widest mb-3">Email
                                    Address</label>
                                <input type="email" class="search-input" id="admEmail" placeholder="admin@example.com"
                                    required>
                            </div>
                            <div class="col-md-6">
                                <label
                                    class="form-label text-xs fw-bold text-secondary text-uppercase tracking-widest mb-3">Phone
                                    Number</label>
                                <input type="text" class="search-input" id="admPhone" placeholder="+94 77 123 4567"
                                    required>
                            </div>
                            <div class="col-12">
                                <label
                                    class="form-label text-xs fw-bold text-secondary text-uppercase tracking-widest mb-3">Role</label>
                                <select class="search-input form-select" id="admRole" required>
                                    <option value="SYSTEM_ADMIN">System Admin</option>
                                    <option value="ADMIN">Admin</option>
                                </select>
                            </div>
                        </div>
                        <button type="submit" class="btn-modern btn-primary-modern w-100 py-3">Create
                            Administrator</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Edit Admin Modal -->
    <div class="modal fade" id="editAdminModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 glass-card p-0 shadow-2xl">
                <div class="modal-header border-black/10 p-5 pb-4">
                    <div>
                        <h4 class="modal-title fw-bold display-6 tracking-tight">Edit Administrator</h4>
                        <p class="text-secondary text-sm m-0 mt-1">Update administrative permissions.</p>
                    </div>
                    <button type="button" class="icon-btn" data-bs-dismiss="modal"><i data-lucide="x"
                            size="24"></i></button>
                </div>
                <form id="editAdminForm">
                    <input type="hidden" id="editAdmId">
                    <div class="modal-body p-5 pt-4">
                        <div class="row g-4 mb-5">
                            <div class="col-12">
                                <label
                                    class="form-label text-xs fw-bold text-secondary text-uppercase tracking-widest mb-3">Full
                                    Name</label>
                                <input type="text" class="search-input" id="editAdmFullName"
                                    placeholder="e.g. Alexander Sterling" required>
                            </div>
                            <div class="col-md-12">
                                <label
                                    class="form-label text-xs fw-bold text-secondary text-uppercase tracking-widest mb-3">Username</label>
                                <input type="text" class="search-input" id="editAdmUsername"
                                    placeholder="e.g. alex_admin" required>
                            </div>
                            <div class="col-md-6">
                                <label
                                    class="form-label text-xs fw-bold text-secondary text-uppercase tracking-widest mb-3">Email
                                    Address</label>
                                <input type="email" class="search-input" id="editAdmEmail"
                                    placeholder="admin@example.com" required>
                            </div>
                            <div class="col-md-6">
                                <label
                                    class="form-label text-xs fw-bold text-secondary text-uppercase tracking-widest mb-3">Phone
                                    Number</label>
                                <input type="text" class="search-input" id="editAdmPhone" placeholder="+94 77 123 4567"
                                    required>
                            </div>
                            <div class="col-12">
                                <label
                                    class="form-label text-xs fw-bold text-secondary text-uppercase tracking-widest mb-3">Role</label>
                                <select class="search-input form-select" id="editAdmRole" required>
                                    <option value="SYSTEM_ADMIN">System Admin</option>
                                    <option value="ADMIN">Admin</option>
                                </select>
                            </div>
                        </div>
                        <button type="submit" class="btn-modern btn-primary-modern w-100 py-3">Save Changes</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        function formatLabel(str) {
            if (!str) return '';
            return str.split('_').map(word =>
                word.charAt(0).toUpperCase() + word.slice(1).toLowerCase()
            ).join(' ');
        }

        async function loadAdmins() {
            try {

                const admins = await api.getAdmins();
                const tbody = document.getElementById('adminTableBody');
                tbody.innerHTML = '';

                admins.forEach(adm => {
                    const initials = adm.fullName.split(' ').map(n => n[0]).join('').substring(0, 2).toUpperCase();
                    const tr = document.createElement('tr');
                    tr.className = 'cursor-pointer hover-glass';
                    tr.onclick = (e) => {
                        if (!e.target.closest('button')) {
                            showProfilePreview('admin', adm);
                        }
                    };
                    tr.innerHTML = `
                        <td>
                            <div class="d-flex align-items-center gap-3">
                                <div class="w-10 h-10 rounded-xl bg-indigo-500/20 text-indigo-400 d-flex align-items-center justify-center text-xs fw-bold">${initials}</div>
                                <div>
                                    <p class="fw-bold m-0">${adm.fullName}</p>
                                    <p class="text-xs text-secondary m-0">@${adm.username}</p>
                                </div>
                            </div>
                        </td>
                        <td><span class="badge-custom badge-info px-3">${formatLabel(adm.role)}</span></td>
                        <td class="text-end">
                            <div class="d-flex justify-content-end gap-2">
                                <button class="icon-btn text-indigo-400" onclick="editAdmin('${adm.id}')"><i data-lucide="edit-3" size="16"></i></button>
                                <button class="icon-btn text-rose-500 hover:text-rose-600" onclick="deleteAdmin('${adm.id}')"><i data-lucide="trash-2" size="16"></i></button>
                            </div>
                        </td>
                    `;
                    tbody.appendChild(tr);
                });
                lucide.createIcons();
            } catch (error) {
                console.error('Error loading admins:', error);
            }
        }

        async function editAdmin(id) {
            try {
                const adm = await api.getAdminById(id);
                document.getElementById('editAdmId').value = adm.id;
                document.getElementById('editAdmFullName').value = adm.fullName;
                document.getElementById('editAdmUsername').value = adm.username;
                document.getElementById('editAdmEmail').value = adm.email || '';
                document.getElementById('editAdmPhone').value = adm.phone || '';
                document.getElementById('editAdmRole').value = adm.role;

                let modalEl = document.getElementById('editAdminModal');
                let modal = bootstrap.Modal.getInstance(modalEl);
                if (!modal) modal = new bootstrap.Modal(modalEl);
                modal.show();
            } catch (error) {
                console.error('Error loading admin details:', error);
            }
        }

        document.getElementById('editAdminForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const id = document.getElementById('editAdmId').value;
            try {
                const data = {
                    id: id,
                    fullName: document.getElementById('editAdmFullName').value,
                    username: document.getElementById('editAdmUsername').value,
                    email: document.getElementById('editAdmEmail').value,
                    phone: document.getElementById('editAdmPhone').value,
                    role: document.getElementById('editAdmRole').value
                };

                await api.updateAdmin(id, data);

                // Close modal
                const modalEl = document.getElementById('editAdminModal');
                const modal = bootstrap.Modal.getInstance(modalEl);
                if (modal) modal.hide();

                loadAdmins();
            } catch (error) {
                console.error('Error updating admin:', error);
                alert('Failed to update administrator. Please try again.');
            }
        });

        async function deleteAdmin(id) {
            if (confirm('Delete this admin?')) {
                await api.deleteAdmin(id);
                loadAdmins();
            }
        }

        document.getElementById('newAdminForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            try {
                const data = {
                    fullName: document.getElementById('admFullName').value,
                    username: document.getElementById('admUsername').value,
                    password: document.getElementById('admPassword').value,
                    email: document.getElementById('admEmail').value,
                    phone: document.getElementById('admPhone').value,
                    role: document.getElementById('admRole').value
                };
                await api.createAdmin(data);

                const modalEl = document.getElementById('newAdminModal');
                const modal = bootstrap.Modal.getInstance(modalEl);
                if (modal) modal.hide();

                e.target.reset();
                loadAdmins();
            } catch (error) {
                console.error('Error creating admin:', error);
                alert('Failed to create administrator.');
            }
        });

        document.addEventListener('DOMContentLoaded', () => {
            initSidebar('admins');
            loadAdmins();
        });
    </script>
</body>

</html>
