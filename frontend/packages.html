<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DriveHUB - Course Packages</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="css/style.css" rel="stylesheet">
    <script src="js/api.js"></script>
    <script src="js/components.js"></script>
</head>

<body>

    <main class="main-content">
        <div class="container-fluid p-0">
            <div class="d-flex justify-content-between align-items-end mb-4">
                <div>
                    <h2 class="h3 fw-bold mb-1">Course Packages</h2>
                    <p class="text-secondary mb-0">Manage training bundles, pricing, and curriculum hours.</p>
                </div>
                <button class="btn-modern btn-primary-modern" id="createPackageBtn" data-bs-toggle="modal"
                    data-bs-target="#newPackageModal">
                    <i data-lucide="plus" class="me-2" size="18"></i> Create Package
                </button>
            </div>

            <div class="row g-4" id="packageList">
                <!-- Package cards injected here -->
            </div>
        </div>
    </main>

    <!-- New Package Modal -->
    <div class="modal fade" id="newPackageModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 glass-card p-0 shadow-2xl">
                <div class="modal-header border-black/10 p-5 pb-4">
                    <div>
                        <h4 class="modal-title fw-bold display-6 tracking-tight">New Course Package</h4>
                        <p class="text-secondary text-sm m-0 mt-1">Define a new training bundle and pricing.</p>
                    </div>
                    <button type="button" class="icon-btn" data-bs-dismiss="modal"><i data-lucide="x"
                            size="24"></i></button>
                </div>
                <form id="newPackageForm">
                    <div class="modal-body p-5 pt-4">
                        <div class="row g-4 mb-5">
                            <div class="col-12">
                                <label class="form-label text-xs fw-bold text-secondary text-uppercase mb-3">Package
                                    Name</label>
                                <input type="text" class="search-input" id="pkgName"
                                    placeholder="e.g., Full Practical Bundle" required>
                            </div>
                            <div class="col-12">
                                <label
                                    class="form-label text-xs fw-bold text-secondary text-uppercase mb-3">Description</label>
                                <textarea class="search-input" id="pkgDesc" rows="3"
                                    placeholder="Brief details about what's included..."></textarea>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label text-xs fw-bold text-secondary text-uppercase mb-3">Price
                                    ($)</label>
                                <input type="number" step="1" min="0" class="search-input" id="pkgPrice"
                                    placeholder="e.g. 500" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label text-xs fw-bold text-secondary text-uppercase mb-3">License
                                    Category</label>
                                <select class="search-input form-select" id="pkgCategory" required>
                                    <option value="MOTORCYCLE">Motorcycle</option>
                                    <option value="LIGHT_VEHICLE">Light Vehicle</option>
                                    <option value="HEAVY_VEHICLE">Heavy Vehicle</option>
                                    <option value="BUS">Bus</option>
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label text-xs fw-bold text-secondary text-uppercase mb-3">Theory
                                    Hours</label>
                                <input type="number" step="1" min="0" class="search-input" id="pkgTheory" value="10">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label text-xs fw-bold text-secondary text-uppercase mb-3">Practical
                                    Hours</label>
                                <input type="number" step="1" min="0" class="search-input" id="pkgPractical" value="20">
                            </div>
                        </div>
                        <button type="submit" class="btn-modern btn-primary-modern w-100 py-3">Save Package</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Edit Package Modal -->
    <div class="modal fade" id="editPackageModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 glass-card p-0 shadow-2xl">
                <div class="modal-header border-black/10 p-5 pb-4">
                    <div>
                        <h4 class="modal-title fw-bold display-6 tracking-tight">Edit Course Package</h4>
                        <p class="text-secondary text-sm m-0 mt-1">Update package details and requirements.</p>
                    </div>
                    <button type="button" class="icon-btn" data-bs-dismiss="modal"><i data-lucide="x"
                            size="24"></i></button>
                </div>
                <form id="editPackageForm">
                    <input type="hidden" id="editPkgId">
                    <div class="modal-body p-5 pt-4">
                        <div class="row g-4 mb-5">
                            <div class="col-12">
                                <label class="form-label text-xs fw-bold text-secondary text-uppercase mb-3">Package
                                    Name</label>
                                <input type="text" class="search-input" id="editPkgName" required>
                            </div>
                            <div class="col-12">
                                <label
                                    class="form-label text-xs fw-bold text-secondary text-uppercase mb-3">Description</label>
                                <textarea class="search-input" id="editPkgDesc" rows="3"></textarea>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label text-xs fw-bold text-secondary text-uppercase mb-3">Price
                                    ($)</label>
                                <input type="number" step="1" min="0" class="search-input" id="editPkgPrice"
                                    placeholder="e.g. 500" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label text-xs fw-bold text-secondary text-uppercase mb-3">License
                                    Category</label>
                                <select class="search-input form-select" id="editPkgCategory" required>
                                    <option value="MOTORCYCLE">Motorcycle</option>
                                    <option value="LIGHT_VEHICLE">Light Vehicle</option>
                                    <option value="HEAVY_VEHICLE">Heavy Vehicle</option>
                                    <option value="BUS">Bus</option>
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label text-xs fw-bold text-secondary text-uppercase mb-3">Theory
                                    Hours</label>
                                <input type="number" step="1" min="0" class="search-input" id="editPkgTheory">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label text-xs fw-bold text-secondary text-uppercase mb-3">Practical
                                    Hours</label>
                                <input type="number" step="1" min="0" class="search-input" id="editPkgPractical">
                            </div>
                        </div>
                        <button type="submit" class="btn-modern btn-primary-modern w-100 py-3">Update Package</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        function formatLabel(str) {
            if (!str) return '';
            return str.split('_').map(word =>
                word.charAt(0).toUpperCase() + word.slice(1).toLowerCase()
            ).join(' ');
        }

        async function loadPackages() {
            try {
                const packages = await api.getPackages();
                const container = document.getElementById('packageList');
                container.innerHTML = '';

                const role = localStorage.getItem('userRole');
                const isStudent = role === 'ROLE_STUDENT';

                if (isStudent) {
                    document.getElementById('createPackageBtn').style.display = 'none';
                    document.querySelector('p.text-secondary.mb-0').textContent = 'Explore our training bundles and curriculum details.';
                }

                packages.forEach(pkg => {
                    const card = `
                        <div class="col-md-4">
                            <div class="glass-card h-100 d-flex flex-column">
                                <div class="d-flex justify-content-between align-items-start mb-3">
                                    <div class="w-12 h-12 rounded-xl bg-indigo-500/20 text-indigo-400 d-flex align-items-center justify-center">
                                        <i data-lucide="package" size="24"></i>
                                    </div>
                                    ${!isStudent ? `
                                    <div class="dropdown">
                                        <button class="icon-btn" data-bs-toggle="dropdown"><i data-lucide="more-vertical" size="18"></i></button>
                                        <ul class="dropdown-menu dropdown-menu-end glass-card border-white/10 shadow-xl">
                                            <li><a class="dropdown-item py-2" href="#" onclick="editPkg('${pkg.id}')">Edit Details</a></li>
                                            <li><hr class="dropdown-divider border-black/10"></li>
                                            <li><a class="dropdown-item py-2 text-rose-500 hover:text-rose-600" href="#" onclick="deletePkg('${pkg.id}')">Delete Package</a></li>
                                        </ul>
                                    </div>
                                    ` : ''}
                                </div>
                                <h4 class="h5 fw-bold mb-2">${pkg.name}</h4>
                                <p class="text-sm text-secondary flex-grow-1">${pkg.description || 'No description provided.'}</p>
                                <div class="mt-4 pt-4 border-top border-black/10">
                                    <div class="d-flex justify-content-between mb-2">
                                        <span class="text-xs text-secondary uppercase tracking-wider fw-bold">Category</span>
                                        <span class="text-xs fw-bold text-indigo-400">${formatLabel(pkg.licenseCategory)}</span>
                                    </div>
                                    <div class="d-flex justify-content-between mb-3">
                                        <span class="text-xs text-secondary uppercase tracking-wider fw-bold">Training</span>
                                        <span class="text-xs fw-bold">${pkg.theoryHours}T / ${pkg.practicalHours}P Hours</span>
                                    </div>
                                    <div class="d-flex justify-content-between align-items-center mb-4">
                                        <span class="h4 fw-bold m-0">$${pkg.price.toFixed(2)}</span>
                                        <span class="badge bg-indigo-500/10 text-indigo-400 px-3 py-1 rounded-pill">Active Bundle</span>
                                    </div>
                                    ${isStudent ? `
                                        <button class="btn-modern w-100 py-3 bg-rose-500 hover:bg-rose-600 text-white border-0 shadow-lg shadow-rose-500/20 transition-all active:scale-95 justify-content-center" onclick="buyPackage('${pkg.id}', '${pkg.name}', ${pkg.price})">
                                            <i data-lucide="credit-card" size="18" class="me-2"></i> Buy Package
                                        </button>
                                    ` : ''}
                                </div>
                            </div>
                        </div>
                    `;
                    container.insertAdjacentHTML('beforeend', card);
                });
                lucide.createIcons();
            } catch (error) {
                console.error('Error loading packages:', error);
            }
        }

        function buyPackage(id, name, price) {
            window.location.href = `payments.html?action=buy&packageId=${id}&packageName=${encodeURIComponent(name)}&price=${price}`;
        }

        async function editPkg(id) {
            const pkg = await api.getPackageById(id);
            document.getElementById('editPkgId').value = pkg.id;
            document.getElementById('editPkgName').value = pkg.name;
            document.getElementById('editPkgDesc').value = pkg.description || '';
            document.getElementById('editPkgPrice').value = pkg.price;
            document.getElementById('editPkgCategory').value = pkg.licenseCategory;
            document.getElementById('editPkgTheory').value = pkg.theoryHours;
            document.getElementById('editPkgPractical').value = pkg.practicalHours;
            new bootstrap.Modal(document.getElementById('editPackageModal')).show();
        }

        async function deletePkg(id) {
            if (confirm('Are you sure you want to delete this package? This may affect students enrolled in it.')) {
                await api.deletePackage(id);
                loadPackages();
            }
        }

        document.getElementById('newPackageForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const data = {
                name: document.getElementById('pkgName').value,
                description: document.getElementById('pkgDesc').value,
                price: parseFloat(document.getElementById('pkgPrice').value),
                licenseCategory: document.getElementById('pkgCategory').value,
                theoryHours: parseInt(document.getElementById('pkgTheory').value),
                practicalHours: parseInt(document.getElementById('pkgPractical').value)
            };
            await api.createPackage(data);
            bootstrap.Modal.getInstance(document.getElementById('newPackageModal')).hide();
            e.target.reset();
            loadPackages();
        });

        document.getElementById('editPackageForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const id = document.getElementById('editPkgId').value;
            const data = {
                name: document.getElementById('editPkgName').value,
                description: document.getElementById('editPkgDesc').value,
                price: parseFloat(document.getElementById('editPkgPrice').value),
                licenseCategory: document.getElementById('editPkgCategory').value,
                theoryHours: parseInt(document.getElementById('editPkgTheory').value),
                practicalHours: parseInt(document.getElementById('editPkgPractical').value)
            };
            await api.updatePackage(id, data);
            bootstrap.Modal.getInstance(document.getElementById('editPackageModal')).hide();
            loadPackages();
        });

        document.addEventListener('DOMContentLoaded', () => {
            initSidebar('packages');
            loadPackages();
        });
    </script>
</body>

</html>
