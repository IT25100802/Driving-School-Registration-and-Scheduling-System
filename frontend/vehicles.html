<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DriveHUB - Vehicle Management</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="css/style.css" rel="stylesheet">
    <script src="js/api.js"></script>
    <script src="js/components.js"></script>
</head>

<body>

    <main class="main-content">
        <div class="container-fluid p-0">
            <div class="d-flex justify-content-between align-items-end mb-5">
                <div>
                    <h2 class="display-6 fw-bold mb-1 tracking-tight">Vehicle Management</h2>
                    <p class="text-secondary mb-0">Monitor health, schedule repairs, and review fleet service history.
                    </p>
                </div>
                <button class="btn-modern btn-primary-modern" data-bs-toggle="modal" data-bs-target="#addVehicleModal">
                    <i data-lucide="plus" size="18"></i> Add New Vehicle
                </button>
            </div>

            <div class="row g-4 mb-5" id="vehicleStats">
                <!-- Stats injected here -->
            </div>

            <div class="glass-card mb-4">
                <h4 class="h5 fw-bold mb-4 tracking-tight">Fleet Inventory</h4>
                <div class="table-responsive">
                    <table class="table custom-table mb-0">
                        <thead>
                            <tr>
                                <th>Vehicle</th>
                                <th>Plate Number</th>
                                <th>Type</th>
                                <th>Assigned Category</th>
                                <th>Status</th>
                                <th class="text-end">Action</th>
                            </tr>
                        </thead>
                        <tbody id="vehicleTableBody">
                            <!-- Data injected here -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <!-- Modal... -->
    <div class="modal fade" id="addVehicleModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered modal-lg">
            <div class="modal-content border-0 glass-card p-0 shadow-2xl">
                <div class="modal-header border-black/10 p-5 pb-4">
                    <div>
                        <h4 class="modal-title fw-bold display-6 tracking-tight">Add Vehicle</h4>
                        <p class="text-secondary text-sm m-0 mt-1">Register a new vehicle to the fleet.</p>
                    </div>
                    <button type="button" class="icon-btn" data-bs-dismiss="modal"><i data-lucide="x"
                            size="24"></i></button>
                </div>
                <form id="addVehicleForm">
                    <div class="modal-body p-5 pt-4">
                        <div class="row g-4 mb-5">
                            <div class="col-md-6">
                                <label
                                    class="form-label text-xs fw-bold text-secondary text-uppercase tracking-widest mb-3">Registration
                                    Number</label>
                                <input type="text" class="search-input" id="vRegNo" placeholder="e.g. WP ABC-1234"
                                    required>
                            </div>
                            <div class="col-md-6">
                                <label
                                    class="form-label text-xs fw-bold text-secondary text-uppercase tracking-widest mb-3">Make</label>
                                <input type="text" class="search-input" id="vMake" placeholder="e.g. Toyota" required>
                            </div>
                            <div class="col-md-6">
                                <label
                                    class="form-label text-xs fw-bold text-secondary text-uppercase tracking-widest mb-3">Model</label>
                                <input type="text" class="search-input" id="vModel" placeholder="e.g. Prius" required>
                            </div>
                            <div class="col-md-6">
                                <label
                                    class="form-label text-xs fw-bold text-secondary text-uppercase tracking-widest mb-3">Year</label>
                                <input type="number" class="search-input" id="vYear" placeholder="e.g. 2018" required>
                            </div>
                            <div class="col-md-6">
                                <label
                                    class="form-label text-xs fw-bold text-secondary text-uppercase tracking-widest mb-3">Type</label>
                                <select class="search-input form-select" id="vType" required>
                                    <option value="CAR">Car</option>
                                    <option value="MOTORCYCLE">Motorcycle</option>
                                    <option value="VAN">Van</option>
                                    <option value="BUS">Bus</option>
                                    <option value="LORRY">Lorry</option>
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label
                                    class="form-label text-xs fw-bold text-secondary text-uppercase tracking-widest mb-3">Assigned
                                    Category</label>
                                <select class="search-input form-select" id="vCategory" required>
                                    <option value="MOTORCYCLE">Motorcycle</option>
                                    <option value="LIGHT_VEHICLE">Light Vehicle</option>
                                    <option value="HEAVY_VEHICLE">Heavy Vehicle</option>
                                    <option value="BUS">Bus</option>
                                </select>
                            </div>
                        </div>
                        <div class="d-flex gap-4">
                            <button type="button" class="btn-modern btn-outline-modern flex-grow-1 py-3"
                                data-bs-dismiss="modal">Cancel</button>
                            <button type="submit" class="btn-modern btn-primary-modern flex-grow-1 py-3">Register
                                Vehicle</button>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Edit Vehicle Modal -->
    <div class="modal fade" id="editVehicleModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered modal-lg">
            <div class="modal-content border-0 glass-card p-0 shadow-2xl">
                <div class="modal-header border-black/10 p-5 pb-4">
                    <div>
                        <h4 class="modal-title fw-bold display-6 tracking-tight">Edit Vehicle</h4>
                        <p class="text-secondary text-sm m-0 mt-1">Update vehicle information.</p>
                    </div>
                    <button type="button" class="icon-btn" data-bs-dismiss="modal"><i data-lucide="x"
                            size="24"></i></button>
                </div>
                <form id="editVehicleForm">
                    <input type="hidden" id="editVId">
                    <div class="modal-body p-5 pt-4">
                        <div class="row g-4 mb-5">
                            <div class="col-md-6">
                                <label
                                    class="form-label text-xs fw-bold text-secondary text-uppercase tracking-widest mb-3">Registration
                                    Number</label>
                                <input type="text" class="search-input" id="editVRegNo" placeholder="Plate Number"
                                    required>
                            </div>
                            <div class="col-md-6">
                                <label
                                    class="form-label text-xs fw-bold text-secondary text-uppercase tracking-widest mb-3">Make</label>
                                <input type="text" class="search-input" id="editVMake" placeholder="e.g. Toyota"
                                    required>
                            </div>
                            <div class="col-md-6">
                                <label
                                    class="form-label text-xs fw-bold text-secondary text-uppercase tracking-widest mb-3">Model</label>
                                <input type="text" class="search-input" id="editVModel" placeholder="e.g. Prius"
                                    required>
                            </div>
                            <div class="col-md-6">
                                <label
                                    class="form-label text-xs fw-bold text-secondary text-uppercase tracking-widest mb-3">Year</label>
                                <input type="number" class="search-input" id="editVYear" placeholder="2018" required>
                            </div>
                            <div class="col-md-6">
                                <label
                                    class="form-label text-xs fw-bold text-secondary text-uppercase tracking-widest mb-3">Type</label>
                                <select class="search-input form-select" id="editVType" required>
                                    <option value="CAR">Car</option>
                                    <option value="MOTORCYCLE">Motorcycle</option>
                                    <option value="VAN">Van</option>
                                    <option value="BUS">Bus</option>
                                    <option value="LORRY">Lorry</option>
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label
                                    class="form-label text-xs fw-bold text-secondary text-uppercase tracking-widest mb-3">Assigned
                                    Category</label>
                                <select class="search-input form-select" id="editVCategory" required>
                                    <option value="MOTORCYCLE">Motorcycle</option>
                                    <option value="LIGHT_VEHICLE">Light Vehicle</option>
                                    <option value="HEAVY_VEHICLE">Heavy Vehicle</option>
                                    <option value="BUS">Bus</option>
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label
                                    class="form-label text-xs fw-bold text-secondary text-uppercase tracking-widest mb-3">Status</label>
                                <select class="search-input form-select" id="editVStatus" required>
                                    <option value="AVAILABLE">Available</option>
                                    <option value="OPERATIONAL">Operational</option>
                                    <option value="MAINTENANCE">Maintenance</option>
                                    <option value="OUT_OF_SERVICE">Out of Service</option>
                                </select>
                            </div>
                        </div>
                        <div class="d-flex gap-4">
                            <button type="button" class="btn-modern btn-outline-modern flex-grow-1 py-3"
                                data-bs-dismiss="modal">Cancel</button>
                            <button type="submit" class="btn-modern btn-primary-modern flex-grow-1 py-3">Save
                                Changes</button>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        let allVehicles = [];

        function formatLabel(str) {
            if (!str) return '';
            return str.split('_').map(word =>
                word.charAt(0).toUpperCase() + word.slice(1).toLowerCase()
            ).join(' ');
        }

        async function loadVehicles() {
            try {
                allVehicles = await api.getVehicles();
                renderVehicles(allVehicles);
                renderStats();
            } catch (error) {
                console.error('Error loading vehicles:', error);
            }
        }

        function renderStats() {
            const container = document.getElementById('vehicleStats');
            const total = allVehicles.length;
            const operational = allVehicles.filter(v => v.status === 'OPERATIONAL' || v.status === 'AVAILABLE').length;
            const maintenance = allVehicles.filter(v => v.status === 'MAINTENANCE').length;

            container.innerHTML = `
                <div class="col-md-4">
                    <div class="glass-card">
                        <div class="d-flex justify-content-between align-items-start mb-4">
                            <div class="stat-icon bg-emerald-500/10 text-emerald-400"><i data-lucide="check-circle-2"></i></div>
                            <h3 class="stat-value m-0">${operational}</h3>
                        </div>
                        <h5 class="fw-bold fs-5 mb-1">Operational</h5>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="glass-card">
                        <div class="d-flex justify-content-between align-items-start mb-4">
                            <div class="stat-icon bg-amber-500/10 text-amber-400"><i data-lucide="wrench"></i></div>
                            <h3 class="stat-value m-0">${maintenance}</h3>
                        </div>
                        <h5 class="fw-bold fs-5 mb-1">In Workshop</h5>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="glass-card">
                        <div class="d-flex justify-content-between align-items-start mb-4">
                            <div class="stat-icon bg-indigo-500/10 text-indigo-400"><i data-lucide="car"></i></div>
                            <h3 class="stat-value m-0">${total}</h3>
                        </div>
                        <h5 class="fw-bold fs-5 mb-1">Total Fleet</h5>
                    </div>
                </div>
            `;
            lucide.createIcons();
        }

        function renderVehicles(vehicles) {
            const tbody = document.getElementById('vehicleTableBody');
            tbody.innerHTML = '';

            vehicles.forEach(v => {
                const tr = document.createElement('tr');
                tr.className = 'cursor-pointer hover-glass';
                tr.onclick = (e) => {
                    if (!e.target.closest('button')) {
                        showProfilePreview('vehicle', v);
                    }
                };
                tr.innerHTML = `
                    <td>
                        <div class="d-flex align-items-center gap-3">
                            <div class="w-10 h-10 rounded-xl bg-black/5 d-flex align-items-center justify-center text-indigo-400 border border-black/10"><i data-lucide="car-front" size="20"></i></div>
                            <div>
                                <p class="fw-bold m-0">${v.make} ${v.model}</p>
                                <p class="text-xs text-secondary m-0">${v.year}</p>
                            </div>
                        </div>
                    </td>
                    <td><span class="fw-bold">${v.registrationNumber}</span></td>
                    <td>${formatLabel(v.vehicleType)}</td>
                    <td>${formatLabel(v.assignedCategory)}</td>
                    <td>
                        <span class="badge-custom ${v.status === 'OPERATIONAL' || v.status === 'AVAILABLE' ? 'badge-success' : (v.status === 'MAINTENANCE' ? 'badge-warning' : 'badge-info')} px-3">${v.status}</span>
                    </td>
                    <td class="text-end">
                        <div class="d-flex justify-content-end gap-2">
                            <button class="icon-btn text-indigo-400" onclick="editVehicle('${v.id}')"><i data-lucide="edit-3" size="16"></i></button>
                            <button class="icon-btn text-rose-500 hover:text-rose-600" onclick="deleteVehicle('${v.id}')" title="Delete Vehicle"><i data-lucide="trash-2" size="16"></i></button>
                        </div>
                    </td>
                `;
                tbody.appendChild(tr);
            });
            lucide.createIcons();
        }

        async function editVehicle(id) {
            const v = await api.getVehicleById(id);
            document.getElementById('editVId').value = v.id;
            document.getElementById('editVRegNo').value = v.registrationNumber;
            document.getElementById('editVMake').value = v.make;
            document.getElementById('editVModel').value = v.model;
            document.getElementById('editVYear').value = v.year;
            document.getElementById('editVType').value = v.vehicleType;
            document.getElementById('editVCategory').value = v.assignedCategory;
            document.getElementById('editVStatus').value = v.status;
            new bootstrap.Modal(document.getElementById('editVehicleModal')).show();
        }

        document.getElementById('editVehicleForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const id = document.getElementById('editVId').value;
            const v = await api.getVehicleById(id);

            v.registrationNumber = document.getElementById('editVRegNo').value;
            v.make = document.getElementById('editVMake').value;
            v.model = document.getElementById('editVModel').value;
            v.year = parseInt(document.getElementById('editVYear').value);
            v.vehicleType = document.getElementById('editVType').value;
            v.assignedCategory = document.getElementById('editVCategory').value;
            v.status = document.getElementById('editVStatus').value;

            await api.updateVehicle(id, v);
            bootstrap.Modal.getInstance(document.getElementById('editVehicleModal')).hide();
            loadVehicles();
        });

        async function updateVehicleStatus(id, newStatus) {
            try {
                const vehicle = allVehicles.find(v => v.id === id);
                if (vehicle) {
                    vehicle.status = newStatus;
                    await api.updateVehicle(id, vehicle);
                    loadVehicles();
                }
            } catch (err) {
                console.error("Error updating vehicle status:", err);
            }
        }

        async function deleteVehicle(id) {
            if (confirm('Delete this vehicle?')) {
                await api.deleteVehicle(id);
                loadVehicles();
            }
        }

        document.getElementById('addVehicleForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            try {
                const data = {
                    registrationNumber: document.getElementById('vRegNo').value,
                    make: document.getElementById('vMake').value,
                    model: document.getElementById('vModel').value,
                    year: parseInt(document.getElementById('vYear').value),
                    vehicleType: document.getElementById('vType').value,
                    assignedCategory: document.getElementById('vCategory').value,
                    status: 'AVAILABLE'
                };
                await api.createVehicle(data);
                bootstrap.Modal.getInstance(document.getElementById('addVehicleModal')).hide();
                e.target.reset();
                loadVehicles();
            } catch (error) {
                console.error('Registration failed:', error);
                alert('Failed to register vehicle: ' + error.message);
            }
        });

        document.addEventListener('DOMContentLoaded', () => {
            initSidebar('vehicles');
            loadVehicles();
        });
    </script>
</body>

</html>
