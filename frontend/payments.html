<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DriveHUB - Payments & Revenue</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="css/style.css" rel="stylesheet">
    <script src="js/api.js"></script>
    <script src="js/components.js"></script>
</head>

<body>

    <main class="main-content">
        <div class="container-fluid p-0">
            <div class="d-flex justify-content-between align-items-end mb-5">
                <div>
                    <h2 class="display-6 fw-bold mb-1 tracking-tight">Payments & Revenue</h2>
                    <p class="text-secondary mb-0">Monitor financial performance and manage student invoicing.</p>
                </div>
                <button class="btn-modern btn-primary-modern" id="newPaymentBtn" data-bs-toggle="modal"
                    data-bs-target="#newPaymentModal">
                    <i data-lucide="plus" size="18"></i> New Transaction
                </button>
            </div>

            <!-- Stats Grid -->
            <div class="row g-4 mb-5" id="paymentStats">
                <!-- Stats injected here -->
            </div>

            <div class="glass-card mb-4">
                <h4 class="h5 fw-bold mb-4">Recent Transactions</h4>
                <div class="table-responsive">
                    <table class="table custom-table mb-0">
                        <thead>
                            <tr>
                                <th>Date</th>
                                <th>Student</th>
                                <th>Amount</th>
                                <th>Method</th>
                                <th>Status</th>
                                <th class="text-end action-column">Actions</th>
                            </tr>
                        </thead>
                        <tbody id="paymentTableBody">
                            <!-- Data injected here -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <!-- Modal... -->
    <div class="modal fade" id="newPaymentModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 glass-card p-0 shadow-2xl">
                <div class="modal-header border-white/10 p-5 pb-4">
                    <h4 class="modal-title fw-bold display-6 tracking-tight">New Payment</h4>
                    <button type="button" class="icon-btn" data-bs-dismiss="modal"><i data-lucide="x"
                            size="24"></i></button>
                </div>
                <form id="newPaymentForm">
                    <div class="modal-body p-5 pt-4">
                        <div class="row g-4 mb-5">
                            <div class="col-12">
                                <label
                                    class="form-label text-xs fw-bold text-secondary text-uppercase tracking-widest mb-3">Student</label>
                                <select class="search-input form-select" id="payStudentId" required>
                                    <option value="">Select Student...</option>
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label
                                    class="form-label text-xs fw-bold text-secondary text-uppercase tracking-widest mb-3">Amount
                                    ($)</label>
                                <input type="number" step="1" min="0" class="search-input" id="payAmount"
                                    placeholder="e.g. 150" required>
                            </div>
                            <div class="col-md-6">
                                <label
                                    class="form-label text-xs fw-bold text-secondary text-uppercase tracking-widest mb-3">Method</label>
                                <select class="search-input form-select" id="payMethod" required>
                                    <option value="CASH">Cash</option>
                                    <option value="BANK_TRANSFER">Bank Transfer</option>
                                </select>
                            </div>
                            <div class="col-12 d-none" id="payRefContainer">
                                <label
                                    class="form-label text-xs fw-bold text-secondary text-uppercase tracking-widest mb-3">Reference
                                    Number</label>
                                <input type="text" class="search-input" id="payReferenceNumber"
                                    placeholder="Enter bank reference number">
                            </div>
                        </div>
                        <button type="submit" class="btn-modern btn-primary-modern w-100 py-3">Record Payment</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Edit Payment Modal -->
    <div class="modal fade" id="editPaymentModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 glass-card p-0 shadow-2xl">
                <div class="modal-header border-white/10 p-5 pb-4">
                    <h4 class="modal-title fw-bold display-6 tracking-tight">Edit Payment</h4>
                    <button type="button" class="icon-btn" data-bs-dismiss="modal"><i data-lucide="x"
                            size="24"></i></button>
                </div>
                <form id="editPaymentForm">
                    <input type="hidden" id="editPayId">
                    <div class="modal-body p-5 pt-4">
                        <div class="row g-4 mb-5">
                            <div class="col-12">
                                <label
                                    class="form-label text-xs fw-bold text-secondary text-uppercase tracking-widest mb-3">Student</label>
                                <select class="search-input form-select" id="editPayStudentId" required>
                                    <option value="">Select Student...</option>
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label
                                    class="form-label text-xs fw-bold text-secondary text-uppercase tracking-widest mb-3">Amount
                                    ($)</label>
                                <input type="number" step="1" min="0" class="search-input" id="editPayAmount"
                                    placeholder="e.g. 150" required>
                            </div>
                            <div class="col-md-6">
                                <label
                                    class="form-label text-xs fw-bold text-secondary text-uppercase tracking-widest mb-3">Method</label>
                                <select class="search-input form-select" id="editPayMethod" required>
                                    <option value="CASH">Cash</option>
                                    <option value="BANK_TRANSFER">Bank Transfer</option>
                                </select>
                            </div>
                            <div class="col-12">
                                <label
                                    class="form-label text-xs fw-bold text-secondary text-uppercase tracking-widest mb-3">Status</label>
                                <select class="search-input form-select" id="editPayStatus" required>
                                    <option value="PAID">Paid</option>
                                    <option value="PENDING">Pending</option>
                                    <option value="REJECTED">Rejected</option>
                                    <option value="REFUNDED">Refunded</option>
                                </select>
                            </div>
                            <div class="col-12 d-none" id="editPayRefContainer">
                                <label
                                    class="form-label text-xs fw-bold text-secondary text-uppercase tracking-widest mb-3">Reference
                                    Number</label>
                                <input type="text" class="search-input" id="editPayReferenceNumber"
                                    placeholder="Enter bank reference number">
                            </div>
                        </div>
                        <button type="submit" class="btn-modern btn-primary-modern w-100 py-3">Save Changes</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        function formatLabel(str) {
            if (!str) return '';
            return str.split('_').map(word =>
                word.charAt(0).toUpperCase() + word.slice(1).toLowerCase()
            ).join(' ');
        }

        let allPayments = [];
        let allStudents = [];
        let allPackages = [];

        async function initPage() {
            try {
                const role = localStorage.getItem('userRole');
                const isStudent = role === 'ROLE_STUDENT';
                const userName = localStorage.getItem('userName');

                if (isStudent) {
                    // Change button text for students
                    const newBtn = document.getElementById('newPaymentBtn');
                    newBtn.innerHTML = '<i data-lucide="credit-card" size="18" class="me-2"></i> Make Payment';
                    // Keep it blue but ensured it's styled correctly
                    newBtn.classList.add('btn-primary-modern', 'border-0', 'justify-content-center');
                    newBtn.style.color = 'white';

                    document.querySelector('.action-column').style.display = 'none';
                    document.getElementById('paymentStats').style.display = 'none';
                    document.querySelector('p.text-secondary.mb-0').textContent = 'Review your payment history and invoices.';
                }

                [allPayments, allStudents, allPackages] = await Promise.all([
                    api.getPayments(),
                    api.getStudents(),
                    api.getPackages()
                ]);

                if (isStudent) {
                    allPayments = allPayments.filter(p => p.studentName === userName);
                }

                renderPayments();
                renderStats();
                populateStudentSelect();
            } catch (error) {
                console.error('Error initializing page:', error);
            }
        }

        function renderStats() {
            const total = allPayments.reduce((sum, p) => p.status === 'PAID' ? sum + p.amount : sum, 0);
            const pending = allPayments.filter(p => p.status === 'PENDING').length;

            document.getElementById('paymentStats').innerHTML = `
                <div class="col-md-4">
                    <div class="glass-card">
                        <p class="stat-label mb-1">Total Revenue</p>
                        <h3 class="stat-value">$${total.toLocaleString()}</h3>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="glass-card">
                        <p class="stat-label mb-1">Transactions</p>
                        <h3 class="stat-value">${allPayments.length}</h3>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="glass-card">
                        <p class="stat-label mb-1">Pending Invoices</p>
                        <h3 class="stat-value">${pending}</h3>
                    </div>
                </div>
            `;
        }

        function renderPayments() {
            const tbody = document.getElementById('paymentTableBody');
            tbody.innerHTML = '';
            const isStudent = localStorage.getItem('userRole') === 'ROLE_STUDENT';

            allPayments.forEach(p => {
                // If rejected, only show to the student, hide from admin/instructor list
                if (p.status && String(p.status).toUpperCase() === 'REJECTED' && !isStudent) return;
                
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${p.paymentDate ? new Date(p.paymentDate).toLocaleDateString() : new Date().toLocaleDateString()}</td>
                    <td><span class="fw-bold">${p.studentName || 'Student'}</span></td>
                    <td class="fw-bold">$${p.amount.toFixed(2)}</td>
                    <td>${formatLabel(p.paymentMethod)}</td>
                    <td><span class="badge-custom ${p.status === 'PAID' ? 'badge-success' : (p.status === 'REJECTED' ? 'badge-danger' : 'badge-warning')} px-3">${formatLabel(p.status)}</span></td>
                    ${!isStudent ? `
                        <td class="text-end">
                            <div class="d-flex justify-content-end gap-2 align-items-center">
                                ${p.status === 'PENDING' ? `
                                    <button class="btn btn-sm btn-success px-3 py-1 text-xs rounded-pill d-flex align-items-center" onclick="approvePayment('${p.id}')">
                                        <i data-lucide="check-circle" size="14" class="me-1"></i> Approve
                                    </button>
                                    <button class="btn btn-sm btn-outline-danger px-3 py-1 text-xs rounded-pill d-flex align-items-center" onclick="rejectPayment('${p.id}')">
                                        <i data-lucide="x-circle" size="14" class="me-1"></i> Reject
                                    </button>
                                ` : `
                                    <button class="icon-btn text-indigo-400" onclick="editPayment('${p.id}')"><i data-lucide="edit-3" size="16"></i></button>
                                    <button class="icon-btn text-rose-500 hover:text-rose-600" onclick="deletePayment('${p.id}')"><i data-lucide="trash-2" size="16"></i></button>
                                    ${p.status === 'PAID' ? `<button class="btn btn-sm btn-outline-danger px-2 py-1 text-xs rounded-pill" onclick="refund('${p.id}')">Refund</button>` : ''}
                                `}
                            </div>
                        </td>
                    ` : ''}
                `;
                tbody.appendChild(tr);
            });
            lucide.createIcons();
        }

        async function editPayment(id) {
            const p = await api.getPaymentById(id);
            document.getElementById('editPayId').value = p.id;
            document.getElementById('editPayStudentId').value = p.studentId;
            document.getElementById('editPayAmount').value = p.amount;
            document.getElementById('editPayMethod').value = p.paymentMethod;
            document.getElementById('editPayStatus').value = p.status;
            document.getElementById('editPayReferenceNumber').value = p.referenceNumber || '';

            // Toggle reference field visibility
            const refContainer = document.getElementById('editPayRefContainer');
            if (p.paymentMethod === 'BANK_TRANSFER') {
                refContainer.classList.remove('d-none');
            } else {
                refContainer.classList.add('d-none');
            }

            new bootstrap.Modal(document.getElementById('editPaymentModal')).show();
        }

        document.getElementById('editPaymentForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const id = document.getElementById('editPayId').value;
            const data = await api.getPaymentById(id);

            data.studentId = document.getElementById('editPayStudentId').value;
            data.amount = parseFloat(document.getElementById('editPayAmount').value);
            data.paymentMethod = document.getElementById('editPayMethod').value;
            data.status = document.getElementById('editPayStatus').value;
            data.referenceNumber = document.getElementById('editPayReferenceNumber').value;

            await api.updatePayment(id, data);
            bootstrap.Modal.getInstance(document.getElementById('editPaymentModal')).hide();
            initPage();
        });

        async function deletePayment(id) {
            if (confirm('Delete this payment?')) {
                await api.deletePayment(id);
                initPage();
            }
        }

        function populateStudentSelect() {
            const select = document.getElementById('payStudentId');
            const editSelect = document.getElementById('editPayStudentId');

            select.innerHTML = '<option value="">Select Student...</option>';
            editSelect.innerHTML = '<option value="">Select Student...</option>';

            const role = localStorage.getItem('userRole');
            const userName = localStorage.getItem('userName');

            allStudents.forEach(s => {
                const isMe = s.fullName === userName;

                // If student, only show themselves
                if (role === 'ROLE_STUDENT' && !isMe) return;

                const opt = document.createElement('option');
                opt.value = s.id;
                opt.textContent = s.fullName;
                opt.dataset.packageId = s.packageId || '';

                if (isMe && role === 'ROLE_STUDENT') {
                    opt.selected = true;
                }

                select.appendChild(opt);

                const editOpt = opt.cloneNode(true);
                editSelect.appendChild(editOpt);
            });
        }

        document.getElementById('payStudentId').addEventListener('change', (e) => {
            const studentId = e.target.value;
            if (!studentId) return;

            const option = e.target.options[e.target.selectedIndex];
            const pkgId = option.dataset.packageId;
            const pkg = allPackages.find(p => p.id === pkgId);

            if (pkg) {
                // Auto fill amount with package price
                document.getElementById('payAmount').value = pkg.price;
            }
        });

        async function refund(id) {
            if (confirm('Refund this payment?')) {
                await api.refundPayment(id);
                initPage();
            }
        }

        async function approvePayment(id) {
            if (confirm('Are you sure you want to approve this bank transfer?')) {
                await api.approvePayment(id);
                initPage();
            }
        }

        async function rejectPayment(id) {
            if (confirm('Are you sure you want to reject this payment?')) {
                try {
                    const p = allPayments.find(item => item.id === id);
                    if (!p) return;
                    
                    // Create a copy and update status
                    const updatedData = { ...p, status: 'REJECTED' };
                    
                    await api.updatePayment(id, updatedData);
                    initPage();
                } catch (err) {
                    console.error('Reject failed:', err);
                    alert('Could not reject payment. Please try again.');
                }
            }
        }

        document.getElementById('newPaymentForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const urlParams = new URLSearchParams(window.location.search);
            const buyPackageId = urlParams.get('packageId');

            const studentId = document.getElementById('payStudentId').value;
            const student = allStudents.find(s => s.id === studentId);
            const packageId = buyPackageId || (student ? student.packageId : null);

            const data = {
                studentId: studentId,
                packageId: packageId,
                amount: parseFloat(document.getElementById('payAmount').value),
                paymentMethod: document.getElementById('payMethod').value,
                paymentDate: new Date().toISOString(),
                referenceNumber: document.getElementById('payReferenceNumber').value
            };

            // Validate reference number for bank transfer
            if (data.paymentMethod === 'BANK_TRANSFER' && !data.referenceNumber) {
                alert('Reference number is required for bank transfers.');
                return;
            }

            await api.createPayment(data);
            bootstrap.Modal.getInstance(document.getElementById('newPaymentModal')).hide();
            // Clear URL params after success to prevent re-opening modal on refresh
            if (buyPackageId) {
                window.history.replaceState({}, document.title, window.location.pathname);
            }
            initPage();
        });

        document.addEventListener('DOMContentLoaded', () => {
            initSidebar('payments');
            initPage();

            const urlParams = new URLSearchParams(window.location.search);
            if (urlParams.get('action') === 'buy' || urlParams.get('action') === 'add') {
                const pkgId = urlParams.get('packageId');
                const price = urlParams.get('price');

                if (pkgId && price) {
                    document.getElementById('payAmount').value = price;
                    // Trigger the student select logic to ensure student is selected (it should be auto-selected for students)
                    // and maybe store the packageId somewhere if needed for the transaction
                }

                const modal = new bootstrap.Modal(document.getElementById('newPaymentModal'));
                modal.show();
            }

            // Handle New Payment Method Change
            document.getElementById('payMethod').addEventListener('change', (e) => {
                const container = document.getElementById('payRefContainer');
                if (e.target.value === 'BANK_TRANSFER') {
                    container.classList.remove('d-none');
                } else {
                    container.classList.add('d-none');
                    document.getElementById('payReferenceNumber').value = '';
                }
            });

            // Handle Edit Payment Method Change
            document.getElementById('editPayMethod').addEventListener('change', (e) => {
                const container = document.getElementById('editPayRefContainer');
                if (e.target.value === 'BANK_TRANSFER') {
                    container.classList.remove('d-none');
                } else {
                    container.classList.add('d-none');
                    document.getElementById('editPayReferenceNumber').value = '';
                }
            });
        });
    </script>
</body>

</html>
